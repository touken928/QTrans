name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-14
    timeout-minutes: 180
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: brew install ninja pkg-config autoconf autoconf-archive automake libtool

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        id: cache-vcpkg-downloads
        with:
          path: ${{ github.workspace }}/vcpkg/downloads
          key: vcpkg-downloads-macos-arm64-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'overlay/**') }}
          restore-keys: |
            vcpkg-downloads-macos-arm64-

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        id: cache-vcpkg-binaries
        with:
          path: |
            ${{ github.workspace }}/.vcpkg-cache
            ${{ github.workspace }}/build/vcpkg_installed
          key: vcpkg-binaries-macos-arm64-static-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakePresets.json', 'overlay/**') }}

      - name: Setup vcpkg
        shell: bash
        run: |
          BASELINE="$(grep -o '"baseline": "[^"]*"' vcpkg-configuration.json | head -1 | cut -d'"' -f4)"
          if [ ! -d vcpkg/.git ]; then
            git clone https://github.com/microsoft/vcpkg.git vcpkg
          fi
          git -C vcpkg fetch --depth 1 origin "${BASELINE}"
          git -C vcpkg checkout "${BASELINE}"
          ./vcpkg/bootstrap-vcpkg.sh
          echo "downloads cache hit: ${{ steps.cache-vcpkg-downloads.outputs.cache-hit }}"
          echo "binaries cache hit: ${{ steps.cache-vcpkg-binaries.outputs.cache-hit }}"

      - name: Configure and build
        shell: bash
        run: |
          cmake --preset macos-arm64-static
          cmake --build --preset macos-arm64-static --parallel "$(sysctl -n hw.ncpu)"

      - name: Package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_DIR="dist/QTrans.app"
          mkdir -p "${APP_DIR}/Contents/MacOS"
          cp "build/QTrans" "${APP_DIR}/Contents/MacOS/QTrans"
          chmod +x "${APP_DIR}/Contents/MacOS/QTrans"
          cat > "${APP_DIR}/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>QTrans</string>
            <key>CFBundleIdentifier</key>
            <string>app.qtrans</string>
            <key>CFBundleName</key>
            <string>QTrans</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>VERSION_PLACEHOLDER</string>
            <key>CFBundleVersion</key>
            <string>VERSION_PLACEHOLDER</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST
          sed -i '' "s/VERSION_PLACEHOLDER/${VERSION}/g" "${APP_DIR}/Contents/Info.plist"
          if otool -L "${APP_DIR}/Contents/MacOS/QTrans" | grep -E '@rpath|/vcpkg/'; then
            echo "Unexpected dynamic third-party libraries in static macOS build"
            otool -L "${APP_DIR}/Contents/MacOS/QTrans"
            exit 1
          fi
          (cd dist && ditto -c -k --sequesterResource --keepParent QTrans.app "../QTrans-${VERSION}-macos-arm64.zip")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtrans-macos-arm64
          path: QTrans-*-macos-arm64.zip
          if-no-files-found: error

  build-windows-x64-mingw:
    name: Windows x64 MinGW
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      VCPKG_ROOT: C:/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            git
            pkgconf
            zip

      - name: Verify build tools
        run: |
          pacman -S --noconfirm --needed \
            mingw-w64-x86_64-toolchain \
            mingw-w64-x86_64-cmake \
            mingw-w64-x86_64-ninja
          which ninja
          which cmake
          ninja --version

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        id: cache-vcpkg-downloads
        with:
          path: C:/vcpkg/downloads
          key: vcpkg-downloads-windows-x64-mingw-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'overlay/**') }}
          restore-keys: |
            vcpkg-downloads-windows-x64-mingw-

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        id: cache-vcpkg-binaries
        with:
          path: |
            ${{ github.workspace }}/.vcpkg-cache
            build/vcpkg_installed
          key: vcpkg-binaries-windows-x64-mingw-static-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakePresets.json', 'overlay/**') }}

      - name: Setup vcpkg
        run: |
          BASELINE="$(grep -o '"baseline": "[^"]*"' vcpkg-configuration.json | head -1 | cut -d'"' -f4)"
          if [ ! -d /c/vcpkg/.git ]; then
            git clone https://github.com/microsoft/vcpkg.git /c/vcpkg
          fi
          git -C /c/vcpkg fetch --depth 1 origin "${BASELINE}"
          git -C /c/vcpkg checkout "${BASELINE}"
          /c/vcpkg/bootstrap-vcpkg.sh
          echo "downloads cache hit: ${{ steps.cache-vcpkg-downloads.outputs.cache-hit }}"
          echo "binaries cache hit: ${{ steps.cache-vcpkg-binaries.outputs.cache-hit }}"

      - name: Configure and build
        run: |
          cmake --preset windows-x64-mingw-static
          cmake --build --preset windows-x64-mingw-static --parallel "$(nproc)"

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp build/QTrans.exe dist/
          shopt -s nullglob
          dlls=(dist/*.dll)
          if (( ${#dlls[@]} > 0 )); then
            echo "Unexpected DLLs in static Windows build: ${dlls[*]}"
            exit 1
          fi
          (cd dist && zip -r "../QTrans-${VERSION}-windows-x64-mingw.zip" .)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtrans-windows-x64-mingw
          path: QTrans-*-windows-x64-mingw.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - build-macos-arm64
      - build-windows-x64-mingw
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
