name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  BUILD_TYPE: Release

jobs:
  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-14
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg/downloads
            ${{ github.workspace }}/vcpkg/builtpackages
            ${{ github.workspace }}/build/vcpkg_installed
          key: vcpkg-macos-arm64-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'overlay/**') }}
          restore-keys: |
            vcpkg-macos-arm64-

      - name: Setup vcpkg
        shell: bash
        run: |
          if [ ! -d vcpkg/.git ]; then
            git clone --depth 1 https://github.com/microsoft/vcpkg.git vcpkg
          fi
          ./vcpkg/bootstrap-vcpkg.sh

      - name: Configure and build
        shell: bash
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=arm64-osx \
            -DVCPKG_INSTALL_OPTIONS="--clean-after-build"
          cmake --build build --config "${BUILD_TYPE}" -j "$(sysctl -n hw.ncpu)"

      - name: Package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_DIR="dist/QTrans.app"
          mkdir -p "${APP_DIR}/Contents/MacOS"
          cp "build/QTrans" "${APP_DIR}/Contents/MacOS/QTrans"
          chmod +x "${APP_DIR}/Contents/MacOS/QTrans"
          cat > "${APP_DIR}/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>QTrans</string>
            <key>CFBundleIdentifier</key>
            <string>app.qtrans</string>
            <key>CFBundleName</key>
            <string>QTrans</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>VERSION_PLACEHOLDER</string>
            <key>CFBundleVersion</key>
            <string>VERSION_PLACEHOLDER</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST
          sed -i '' "s/VERSION_PLACEHOLDER/${VERSION}/g" "${APP_DIR}/Contents/Info.plist"
          MACDEPLOYQT="build/vcpkg_installed/arm64-osx/tools/Qt6/bin/macdeployqt"
          if [ -x "${MACDEPLOYQT}" ]; then
            "${MACDEPLOYQT}" "${APP_DIR}" -always-overwrite
          fi
          (cd dist && ditto -c -k --sequesterResource --keepParent QTrans.app "../QTrans-${VERSION}-macos-arm64.zip")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtrans-macos-arm64
          path: QTrans-*-macos-arm64.zip
          if-no-files-found: error

  build-windows-x64-mingw:
    name: Windows x64 MinGW
    runs-on: windows-latest
    timeout-minutes: 180
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            git
            pkgconf
            zip

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/downloads
            C:/vcpkg/builtpackages
            build/vcpkg_installed
          key: vcpkg-windows-x64-mingw-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'overlay/**') }}
          restore-keys: |
            vcpkg-windows-x64-mingw-

      - name: Setup vcpkg
        run: |
          if [ ! -d /c/vcpkg/.git ]; then
            git clone --depth 1 https://github.com/microsoft/vcpkg.git /c/vcpkg
          fi
          /c/vcpkg/bootstrap-vcpkg.sh

      - name: Configure and build
        env:
          VCPKG_ROOT: /c/vcpkg
          VCPKG_DEFAULT_TRIPLET: x64-mingw-dynamic
          VCPKG_DEFAULT_HOST_TRIPLET: x64-mingw-dynamic
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-mingw-dynamic \
            -DVCPKG_INSTALL_OPTIONS="--clean-after-build"
          cmake --build build --config "${BUILD_TYPE}" -j "$(nproc)"

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp build/QTrans.exe dist/
          WINDEPLOYQT="build/vcpkg_installed/x64-mingw-dynamic/tools/Qt6/bin/windeployqt.exe"
          if [ -f "${WINDEPLOYQT}" ]; then
            "${WINDEPLOYQT}" dist/QTrans.exe --verbose 0
          fi
          (cd dist && zip -r "../QTrans-${VERSION}-windows-x64-mingw.zip" .)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtrans-windows-x64-mingw
          path: QTrans-*-windows-x64-mingw.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - build-macos-arm64
      - build-windows-x64-mingw
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
