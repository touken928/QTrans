name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos:
    uses: ./.github/workflows/release/release-macos.yml

  windows:
    uses: ./.github/workflows/release/release-windows.yml

  release:
    name: Publish GitHub Release
    needs:
      - macos
      - windows
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
