name: Branch policy

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  branch-name:
    name: Branch naming
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Validate branch name
        env:
          BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          AUTHOR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login || github.actor }}
        run: |
          set -euo pipefail

          # users/<github-username>/<topic> — topic must be non-empty
          pattern='^users/[^/]+/.+$'
          if ! [[ "$BRANCH" =~ $pattern ]]; then
            echo "::error::Branch '$BRANCH' must match users/<github-username>/<topic> (example: users/${AUTHOR}/my-change)."
            exit 1
          fi

          owner="${BRANCH#users/}"
          owner="${owner%%/*}"
          if [[ "$owner" != "$AUTHOR" ]]; then
            echo "::error::Branch owner '$owner' must match pusher/PR author '$AUTHOR'."
            exit 1
          fi

          echo "Branch name OK: $BRANCH"
