name: Release Windows

on:
  workflow_call:

jobs:
  build-windows-x64-mingw:
    name: Windows x64 MinGW
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      CMAKE_PRESET: windows-x64-mingw-static
      DIST_SUFFIX: windows-x64.exe
      VCPKG_EXE: /c/vcpkg/vcpkg.exe
      VCPKG_ROOT: C:/vcpkg
      VCPKG_TRIPLET: x64-mingw-static-release
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
      VCPKG_INSTALL_ROOT: ${{ github.workspace }}/build/vcpkg_installed

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            git
            pkgconf

      - name: Verify build tools
        run: |
          pacman -S --noconfirm --needed \
            mingw-w64-x86_64-toolchain \
            mingw-w64-x86_64-cmake \
            mingw-w64-x86_64-ninja
          which ninja
          which cmake
          ninja --version

      - name: Cache vcpkg downloads
        id: cache-vcpkg-downloads
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/downloads
          key: vcpkg-downloads-windows-x64-mingw-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'overlay/llama-cpp/portfile.cmake', 'overlay/llama-cpp/vcpkg.json') }}
          restore-keys: |
            vcpkg-downloads-windows-x64-mingw-

      - name: Cache vcpkg binary artifacts
        id: cache-vcpkg-blobs
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          # No restore-keys: avoid reusing pre-GGML_OPENMP=OFF llama-cpp binary blobs (libgomp-1.dll).
          key: vcpkg-blobs-windows-x64-mingw-ggml-openmp-off-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'overlay/llama-cpp/portfile.cmake', 'overlay/llama-cpp/vcpkg.json') }}

      - name: Cache vcpkg_installed
        id: cache-vcpkg-installed
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_INSTALL_ROOT }}
          key: vcpkg-installed-windows-x64-mingw-ggml-openmp-off-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'overlay/llama-cpp/portfile.cmake', 'overlay/llama-cpp/vcpkg.json') }}

      - name: Setup vcpkg
        run: |
          mkdir -p "${VCPKG_DEFAULT_BINARY_CACHE}"

          BASELINE="$(grep -o '"baseline": "[^"]*"' vcpkg-configuration.json | head -1 | cut -d'"' -f4)"
          if [ ! -d "${VCPKG_ROOT}/.git" ]; then
            downloads_backup=""
            if [ -d "${VCPKG_ROOT}/downloads" ]; then
              downloads_backup="$(mktemp -d)"
              mv "${VCPKG_ROOT}/downloads" "${downloads_backup}/downloads"
            fi
            rm -rf "${VCPKG_ROOT}"
            git clone https://github.com/microsoft/vcpkg.git "${VCPKG_ROOT}"
            if [ -n "${downloads_backup}" ] && [ -d "${downloads_backup}/downloads" ]; then
              rm -rf "${VCPKG_ROOT}/downloads"
              mv "${downloads_backup}/downloads" "${VCPKG_ROOT}/downloads"
              rmdir "${downloads_backup}" 2>/dev/null || true
            fi
          fi

          git -C "${VCPKG_ROOT}" fetch --depth 1 origin "${BASELINE}"
          git -C "${VCPKG_ROOT}" checkout "${BASELINE}"
          "${VCPKG_ROOT}/bootstrap-vcpkg.sh"

          echo "downloads cache hit: ${{ steps.cache-vcpkg-downloads.outputs.cache-hit }}"
          echo "binary artifacts cache hit: ${{ steps.cache-vcpkg-blobs.outputs.cache-hit }}"
          echo "vcpkg_installed cache hit: ${{ steps.cache-vcpkg-installed.outputs.cache-hit }}"

          if [ -d "${VCPKG_INSTALL_ROOT}" ]; then
            du -sh "${VCPKG_INSTALL_ROOT}" "${VCPKG_DEFAULT_BINARY_CACHE}" 2>/dev/null || true
            find "${VCPKG_INSTALL_ROOT}" -maxdepth 3 -type d -name 'qtbase*' 2>/dev/null | head -5 || true
          else
            echo "vcpkg_installed missing - expect qtbase to compile from source"
          fi

      - name: Install vcpkg dependencies (Release)
        run: |
          "${VCPKG_EXE}" install \
            --triplet "${VCPKG_TRIPLET}" \
            --host-triplet "${VCPKG_TRIPLET}" \
            --x-manifest-root="${GITHUB_WORKSPACE}" \
            --x-install-root="${VCPKG_INSTALL_ROOT}" \
            --clean-after-build

      - name: Configure application
        run: cmake --preset "${CMAKE_PRESET}"

      - name: Build application
        run: cmake --build --preset "${CMAKE_PRESET}" --parallel "$(nproc)"

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OUTPUT="dist/QTrans-${VERSION}-${DIST_SUFFIX}"

          mkdir -p dist
          cp build/QTrans.exe "${OUTPUT}"

          shopt -s nullglob
          dlls=(dist/*.dll)
          if (( ${#dlls[@]} > 0 )); then
            echo "Unexpected DLLs in static Windows build: ${dlls[*]}"
            exit 1
          fi

          objdump -p build/QTrans.exe > /tmp/qtrans-imports.txt
          echo "Imported DLLs:"
          grep -E '^[[:space:]]+DLL Name:' /tmp/qtrans-imports.txt || true
          if grep -E 'libstdc\+\+-6\.dll|libgcc_s_seh-1\.dll|libwinpthread-1\.dll|libgomp-1\.dll' /tmp/qtrans-imports.txt; then
            echo "Unexpected MinGW runtime DLL imports in QTrans.exe"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtrans-windows-x64-mingw
          path: dist/QTrans-*-windows-x64.exe
          if-no-files-found: error
