name: Release Windows

on:
  workflow_call:

jobs:
  build-mingw-x64:
    name: MinGW x64
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      CMAKE_PRESET: x64-mingw-release
      VCPKG_HOST_TRIPLET: x64-linux-release
      DIST_SUFFIX: mingw-x64
      VCPKG_ROOT: /tmp/vcpkg
      VCPKG_INSTALL_ROOT: ${{ github.workspace }}/build/x64-mingw-release/vcpkg_installed
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build g++-mingw-w64-x86-64-posix pkg-config

      - name: Cache vcpkg downloads
        id: cache-vcpkg-downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}/downloads
          key: vcpkg-downloads-mingw-x64-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'overlay/llama-cpp/portfile.cmake', 'overlay/llama-cpp/vcpkg.json') }}
          restore-keys: |
            vcpkg-downloads-mingw-x64-

      - name: Cache vcpkg binary artifacts
        id: cache-vcpkg-blobs
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-blobs-mingw-x64-static-release-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'overlay/llama-cpp/portfile.cmake', 'overlay/llama-cpp/vcpkg.json') }}
          restore-keys: |
            vcpkg-blobs-mingw-x64-static-release-

      - name: Cache vcpkg_installed
        id: cache-vcpkg-installed
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_INSTALL_ROOT }}
          key: vcpkg-installed-mingw-x64-static-release-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'overlay/llama-cpp/portfile.cmake', 'overlay/llama-cpp/vcpkg.json') }}

      - name: Setup vcpkg
        shell: bash
        run: |
          mkdir -p "${VCPKG_DEFAULT_BINARY_CACHE}"

          BASELINE="$(grep -o '"baseline": "[^"]*"' vcpkg-configuration.json | head -1 | cut -d'"' -f4)"
          if [ ! -d "${VCPKG_ROOT}/.git" ]; then
            downloads_backup=""
            if [ -d "${VCPKG_ROOT}/downloads" ]; then
              downloads_backup="$(mktemp -d)"
              mv "${VCPKG_ROOT}/downloads" "${downloads_backup}/downloads"
            fi
            rm -rf "${VCPKG_ROOT}"
            git clone https://github.com/microsoft/vcpkg.git "${VCPKG_ROOT}"
            if [ -n "${downloads_backup}" ] && [ -d "${downloads_backup}/downloads" ]; then
              rm -rf "${VCPKG_ROOT}/downloads"
              mv "${downloads_backup}/downloads" "${VCPKG_ROOT}/downloads"
              rmdir "${downloads_backup}" 2>/dev/null || true
            fi
          fi

          git -C "${VCPKG_ROOT}" fetch --depth 1 origin "${BASELINE}"
          git -C "${VCPKG_ROOT}" checkout "${BASELINE}"
          "${VCPKG_ROOT}/bootstrap-vcpkg.sh"

          echo "downloads cache hit: ${{ steps.cache-vcpkg-downloads.outputs.cache-hit }}"
          echo "binary artifacts cache hit: ${{ steps.cache-vcpkg-blobs.outputs.cache-hit }}"
          echo "vcpkg_installed cache hit: ${{ steps.cache-vcpkg-installed.outputs.cache-hit }}"

          if [ -d "${VCPKG_INSTALL_ROOT}" ]; then
            du -sh "${VCPKG_INSTALL_ROOT}" "${VCPKG_DEFAULT_BINARY_CACHE}" 2>/dev/null || true
            find "${VCPKG_INSTALL_ROOT}" -maxdepth 3 -type d -name 'qtbase*' 2>/dev/null | head -5 || true
          else
            echo "vcpkg_installed missing - expect qtbase to compile from source"
          fi

      - name: Configure application
        shell: bash
        run: |
          cmake --preset "${CMAKE_PRESET}" \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=/usr/bin/x86_64-w64-mingw32-gcc-posix \
            -DCMAKE_CXX_COMPILER=/usr/bin/x86_64-w64-mingw32-g++-posix \
            -DVCPKG_APPLOCAL_DEPS=OFF

      - name: Build application
        shell: bash
        run: cmake --build --preset "${CMAKE_PRESET}" --parallel "$(nproc)"

      - name: Validate binary
        shell: bash
        run: |
          BINARY="build/${CMAKE_PRESET}/QTrans.exe"
          if ! x86_64-w64-mingw32-objdump -p "${BINARY}" > /dev/null 2>&1; then
            echo "Invalid PE binary"
            exit 1
          fi

          UNWANTED_DLLS="libstdc++-6.dll libgcc_s_seh-1.dll libgcc_s_sjlj-1.dll libwinpthread-1.dll"
          for dll in ${UNWANTED_DLLS}; do
            if x86_64-w64-mingw32-objdump -p "${BINARY}" 2>/dev/null | grep -q "DLL Name: ${dll}$"; then
              echo "ERROR: Unexpected dependency on ${dll} — static linking failed"
              x86_64-w64-mingw32-objdump -p "${BINARY}" | grep "DLL Name"
              exit 1
            fi
          done
          echo "Binary validation passed — no MinGW runtime DLLs leaked"

      - name: Package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OUTPUT="dist/QTrans-${VERSION}-${DIST_SUFFIX}.exe"
          mkdir -p dist
          cp "build/${CMAKE_PRESET}/QTrans.exe" "${OUTPUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtrans-mingw-x64
          path: dist/QTrans-*-mingw-x64.exe
          if-no-files-found: error
